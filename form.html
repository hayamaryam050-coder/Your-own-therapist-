<!DOCTYPE html>
<html>
<head>
  <title>Start Your Journey</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h2>Tell us about you 💌</h2>

<form id="userForm">
  <input placeholder="Name" id="name"><br>
  <input placeholder="Age" id="age"><br>
  <input placeholder="Email" id="email"><br>

  <textarea placeholder="Your future goals" id="goals"></textarea><br>
  <textarea placeholder="What you do when you're down" id="comfort"></textarea><br>

  <input placeholder="Comfort Song" id="song"><br>
  <input placeholder="Favorite Show/Book" id="fav"><br>
  <input placeholder="Favorite Flowers" id="flowers"><br>
  <input placeholder="Favorite Gift" id="gift"><br>

  <button type="button" onclick="saveData()">Submit 💗</button>
</form>

<script src="script.js"></script>

</body>
</html>
